name: regcons
description: "Sistema de gestión y registro para construcción."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  path: ^1.8.3
  sqflite: ^2.3.0
  shared_preferences: ^2.3.5
  intl: ^0.20.2
  url_launcher: ^6.2.5
  image_picker: ^1.1.1
  crypto: ^3.0.5      # <--- 
  xml: ^6.5.0         

  # Dependencias para PDF
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^12.0.1
  path_provider: ^2.1.2
  open_file: ^3.3.2
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0
  xml: ^6.5.0

dependency_overrides:
  path: 1.8.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon_regcons.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/icon_regcons.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/icon/icon_regcons.png
  android_12:
    image: assets/icon/icon_regcons.png
    color: "#ffffff"
